services:
  web:
    build:
      context: .
      target: runner
    ports:
      - '3000:3000'
    environment:
      BETTER_AUTH_SECRET: '${BETTER_AUTH_SECRET:?defina BETTER_AUTH_SECRET antes de usar docker compose}'
      BETTER_AUTH_URL: http://localhost:3000
      DATA_DIR: /data
      DONA_FLORA_LIBRARY_WATCH: '0'
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      LIBRARY_DIR: /data/books
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - dona-flora-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/sign-in').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  dona-flora-data:
