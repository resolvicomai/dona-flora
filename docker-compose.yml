services:
  web:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      - LIBRARY_DIR=/data/books
    volumes:
      - ./data/books:/data/books:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
